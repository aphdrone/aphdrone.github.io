<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Recrutement — APH Drone</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#0B1F3A;--secondary:#1F5FAF;--accent:#4A90E2;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#f5f7fa;color:#222;}

#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--primary),#1a3a6b);}
.login-box{background:white;border-radius:20px;padding:48px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;}
.login-box h1{font-size:1.4rem;font-weight:700;color:var(--primary);margin-bottom:8px;}
.login-box p{font-size:.85rem;color:#7a8fa5;margin-bottom:32px;}
.login-box input{width:100%;padding:12px 16px;border:1.5px solid #dde3ec;border-radius:8px;font-size:.9rem;margin-bottom:12px;outline:none;transition:.2s;}
.login-box input:focus{border-color:var(--accent);}
.login-box button{width:100%;padding:13px;background:var(--secondary);color:white;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:.2s;}
.login-box button:hover{background:var(--accent);}
#login-error{color:#dc2626;font-size:.82rem;margin-top:8px;display:none;}

#admin-screen{display:none;}
.admin-header{background:var(--primary);padding:16px 40px;display:flex;align-items:center;justify-content:space-between;}
.admin-header h1{color:white;font-size:1.1rem;font-weight:600;}
.admin-header span{color:rgba(255,255,255,.5);font-size:.82rem;}
.btn-logout{background:rgba(255,255,255,.1);color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.82rem;transition:.2s;}
.btn-logout:hover{background:rgba(255,255,255,.2);}

.admin-body{display:grid;grid-template-columns:1fr 1.2fr;min-height:calc(100vh - 60px);}
.admin-form{padding:40px;background:white;border-right:1px solid #eee;overflow-y:auto;}
.admin-form h2{font-size:1.1rem;font-weight:700;color:var(--primary);margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid #eee;}
.form-group{margin-bottom:20px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:#555;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1.5px solid #dde3ec;border-radius:8px;font-size:.88rem;outline:none;transition:.2s;font-family:'Inter',sans-serif;color:#222;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);}
.form-group textarea{resize:vertical;min-height:120px;line-height:1.6;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

.type-select{display:flex;flex-wrap:wrap;gap:8px;}
.type-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #dde3ec;background:white;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;color:#555;}
.type-btn:hover{border-color:var(--accent);color:var(--accent);}
.type-btn.active{background:var(--secondary);color:white;border-color:var(--secondary);}

.form-actions{display:flex;gap:12px;margin-top:28px;padding-top:20px;border-top:1px solid #eee;}
.btn-publish{flex:1;padding:13px;background:var(--secondary);color:white;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:.2s;}
.btn-publish:hover{background:var(--accent);}
.btn-publish:disabled{background:#9ca3af;cursor:not-allowed;}
.btn-reset{padding:13px 20px;background:#f5f7fa;color:#555;border:1px solid #dde3ec;border-radius:8px;font-size:.9rem;cursor:pointer;}
#publish-status{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:.85rem;font-weight:500;display:none;}
#publish-status.success{background:#dcfce7;color:#16a34a;}
#publish-status.error{background:#fee2e2;color:#dc2626;}

.admin-list{padding:40px;background:#f9fafb;overflow-y:auto;}
.admin-list h2{font-size:1.1rem;font-weight:700;color:var(--primary);margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #eee;}
.offre-item{background:white;border-radius:12px;padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.offre-item-body{flex:1;min-width:0;}
.offre-item-title{font-size:.88rem;font-weight:600;color:var(--primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.offre-item-meta{display:flex;align-items:center;gap:8px;}
.offre-type-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;color:white;letter-spacing:.04em;text-transform:uppercase;}
.offre-item-actions{display:flex;gap:8px;flex-shrink:0;}
.btn-edit{padding:6px 12px;background:#f0f5ff;color:var(--secondary);border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;}
.btn-edit:hover{background:var(--secondary);color:white;}
.btn-delete{padding:6px 10px;background:#fee2e2;color:#dc2626;border:none;border-radius:6px;font-size:12px;cursor:pointer;transition:.2s;}
.btn-delete:hover{background:#dc2626;color:white;}
#loading-list{text-align:center;padding:40px;color:#7a8fa5;font-size:.88rem;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>Administration</h1>
    <p>Gestion des offres d'emploi APH Drone</p>
    <input type="email" id="login-email" placeholder="Email" autocomplete="email">
    <input type="password" id="login-password" placeholder="Mot de passe" onkeydown="if(event.key==='Enter') doLogin()">
    <button onclick="doLogin()">Se connecter</button>
    <p id="login-error">Email ou mot de passe incorrect.</p>
  </div>
</div>

<div id="admin-screen">
  <div class="admin-header">
    <h1>APH Drone — Gestion du recrutement</h1>
    <div style="display:flex;align-items:center;gap:16px;">
      <span id="admin-user"></span>
      <button class="btn-logout" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>
  <div class="admin-body">

    <div class="admin-form">
      <h2 id="form-title">Nouvelle offre d'emploi</h2>
      <input type="hidden" id="edit-id">

      <div class="form-group">
        <label>Intitulé du poste *</label>
        <input type="text" id="f-titre" placeholder="ex: Télépilote professionnel drone">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Lieu *</label>
          <input type="text" id="f-lieu" placeholder="ex: Luxeuil-les-Bains (70)">
        </div>
        <div class="form-group">
          <label>Date de publication</label>
          <input type="text" id="f-date" placeholder="ex: Juin 2026">
        </div>
      </div>

      <div class="form-group">
        <label>Type de contrat *</label>
        <div class="type-select">
          <button class="type-btn" data-type="CDI" onclick="selectType(this)">CDI</button>
          <button class="type-btn" data-type="CDD" onclick="selectType(this)">CDD</button>
          <button class="type-btn" data-type="Alternance" onclick="selectType(this)">Alternance</button>
          <button class="type-btn" data-type="Stage" onclick="selectType(this)">Stage</button>
          <button class="type-btn" data-type="Freelance" onclick="selectType(this)">Freelance</button>
          <button class="type-btn" data-type="Bénévolat" onclick="selectType(this)">Bénévolat</button>
        </div>
        <input type="hidden" id="f-type">
      </div>

      <div class="form-group">
        <label>Description du poste *</label>
        <textarea id="f-desc" placeholder="Missions, profil recherché, conditions..."></textarea>
      </div>

      <div class="form-group">
        <label>Compétences requises</label>
        <input type="text" id="f-competences" placeholder="ex: DGAC Open A2, STS-01, Pix4D... (séparées par des virgules)">
      </div>

      <div class="form-actions">
        <button class="btn-reset" onclick="resetForm()">Annuler</button>
        <button class="btn-publish" id="btn-publish" onclick="publierOffre()">Publier l'offre</button>
      </div>
      <div id="publish-status"></div>
    </div>

    <div class="admin-list">
      <h2>Offres publiées <span id="offre-count" style="font-weight:400;color:#7a8fa5;font-size:.9rem;"></span></h2>
      <div id="loading-list">Chargement...</div>
      <div id="offre-list"></div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc, orderBy, query }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAV5NQWfp8n9RkTrHSwqssBJ4R9lNAuYK8",
  authDomain: "aph-drone.firebaseapp.com",
  projectId: "aph-drone",
  storageBucket: "aph-drone.firebasestorage.app",
  messagingSenderId: "316810168380",
  appId: "1:316810168380:web:66cb916cec4fdc00b9db39"
};

const typeColors = {
  'CDI':'#16a34a','CDD':'#1F5FAF','Alternance':'#7c3aed',
  'Stage':'#ea580c','Freelance':'#0891b2','Bénévolat':'#6b7280'
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.doLogin = async function(){
  const email = document.getElementById('login-email').value;
  const pwd = document.getElementById('login-password').value;
  try { await signInWithEmailAndPassword(auth, email, pwd); }
  catch(e){ document.getElementById('login-error').style.display='block'; }
};
window.doLogout = async function(){ await signOut(auth); };

onAuthStateChanged(auth, user => {
  if(user){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin-screen').style.display='block';
    document.getElementById('admin-user').textContent = user.email;
    chargerOffres();
  } else {
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('admin-screen').style.display='none';
  }
});

window.selectType = function(btn){
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('f-type').value = btn.dataset.type;
};

window.publierOffre = async function(){
  const titre = document.getElementById('f-titre').value.trim();
  const lieu = document.getElementById('f-lieu').value.trim();
  const date = document.getElementById('f-date').value.trim();
  const type = document.getElementById('f-type').value;
  const desc = document.getElementById('f-desc').value.trim();
  const competences = document.getElementById('f-competences').value.trim();
  const editId = document.getElementById('edit-id').value;

  if(!titre || !lieu || !type || !desc){
    showStatus('Veuillez remplir tous les champs obligatoires.','error');
    return;
  }
  const btn = document.getElementById('btn-publish');
  btn.disabled = true;
  btn.textContent = 'Publication...';

  try {
    const data = { titre, lieu, date: date || new Date().toLocaleDateString('fr-FR',{month:'long',year:'numeric'}), type, desc, competences, ordre: Date.now() };
    if(editId){ await updateDoc(doc(db,'offres',editId), data); showStatus('Offre mise à jour.','success'); }
    else { await addDoc(collection(db,'offres'), data); showStatus('Offre publiée !','success'); }
    resetForm();
    chargerOffres();
  } catch(e){ showStatus('Erreur : '+e.message,'error'); }
  btn.disabled = false;
  btn.textContent = editId ? 'Mettre à jour' : "Publier l'offre";
};

async function chargerOffres(){
  document.getElementById('loading-list').style.display='block';
  document.getElementById('offre-list').innerHTML='';
  const q = query(collection(db,'offres'), orderBy('ordre','desc'));
  const snap = await getDocs(q);
  document.getElementById('loading-list').style.display='none';
  document.getElementById('offre-count').textContent='('+snap.size+')';
  if(snap.empty){ document.getElementById('offre-list').innerHTML='<p style="color:#7a8fa5;text-align:center;padding:40px 0;">Aucune offre publiée</p>'; return; }
  window._offresData = {};
  snap.forEach(docSnap => {
    const d = docSnap.data();
    window._offresData[docSnap.id] = d;
    const color = typeColors[d.type] || '#6b7280';
    const div = document.createElement('div');
    div.className = 'offre-item';
    div.innerHTML = `
      <div class="offre-item-body">
        <div class="offre-item-title">${d.titre}</div>
        <div class="offre-item-meta">
          <span class="offre-type-badge" style="background:${color}">${d.type}</span>
          <span style="font-size:11px;color:#7a8fa5;">${d.lieu} — ${d.date}</span>
        </div>
      </div>
      <div class="offre-item-actions">
        <button class="btn-edit" onclick="editerOffre('${docSnap.id}')">Modifier</button>
        <button class="btn-delete" onclick="supprimerOffre('${docSnap.id}','${d.titre.replace(/'/g,"\\'")}')">✕</button>
      </div>`;
    document.getElementById('offre-list').appendChild(div);
  });
}

window.editerOffre = function(id){
  const d = window._offresData[id];
  if(!d) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('f-titre').value = d.titre||'';
  document.getElementById('f-lieu').value = d.lieu||'';
  document.getElementById('f-date').value = d.date||'';
  document.getElementById('f-desc').value = d.desc||'';
  document.getElementById('f-competences').value = d.competences||'';
  document.getElementById('f-type').value = d.type||'';
  document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === d.type));
  document.getElementById('form-title').textContent = "Modifier l'offre";
  document.getElementById('btn-publish').textContent = 'Mettre à jour';
};

window.supprimerOffre = async function(id, titre){
  if(!confirm('Supprimer "'+titre+'" ?')) return;
  await deleteDoc(doc(db,'offres',id));
  chargerOffres();
};

window.resetForm = function(){
  ['edit-id','f-titre','f-lieu','f-date','f-type','f-desc','f-competences'].forEach(id => document.getElementById(id).value='');
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('form-title').textContent = "Nouvelle offre d'emploi";
  document.getElementById('btn-publish').textContent = "Publier l'offre";
  document.getElementById('btn-publish').disabled = false;
  document.getElementById('publish-status').style.display='none';
};

function showStatus(msg, type){
  const el = document.getElementById('publish-status');
  el.textContent = msg; el.className = type; el.style.display='block';
  setTimeout(()=>el.style.display='none', 4000);
}
</script>
</body>
</html>
