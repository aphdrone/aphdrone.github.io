<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actualités — APH Drone</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">

<style>
:root{
--primary:#0B1F3A;
--secondary:#1F5FAF;
--accent:#4A90E2;
--light:#F5F7FA;
--white:#fff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#fff;
color:#222;
overflow-x:hidden;
}

nav{position:static;}
nav ul{position:relative;}

header{
position:fixed;
top:0;
width:100%;
z-index:999;
padding:20px 60px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(11,31,58,.15);
backdrop-filter:blur(12px);
transition:.3s;
}

.logo{
font-size:28px;
font-weight:700;
color:white;
}

nav ul{
display:flex;
gap:35px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
font-weight:500;
}

/* DROPDOWNS */
nav .has-dropdown{position:relative;}
nav .dropdown{
  display:none;
  position:absolute;
  top:100%;
  left:0;
  background:#fff;
  min-width:220px;
  box-shadow:0 8px 32px rgba(0,0,0,.15);
  border-top:3px solid #4A90E2;
  z-index:99999;
  padding:6px 0;
}
nav .dropdown li{list-style:none;}
nav .dropdown li a{
  display:block;
  padding:10px 18px;
  font-size:13px;
  font-weight:500;
  color:#0B1F3A;
  border-bottom:1px solid #f0f0f0;
  transition:.15s;
  white-space:nowrap;
  text-decoration:none;
}
nav .dropdown li:last-child a{border:none;}
nav .dropdown li a:hover{background:#f5f7fa;color:#4A90E2;padding-left:24px;}

.hero{
height:100vh;
position:relative;
display:flex;
align-items:center;
padding:0 10%;
color:white;
overflow:hidden;
}

.hero video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
top:0;
left:0;
z-index:-2;
}

.hero::before{
content:'';
position:absolute;
inset:0;
background:linear-gradient(
90deg,
rgba(11,31,58,.92),
rgba(11,31,58,.4)
);
z-index:-1;
}

.hero-content{
max-width:700px;
}

.hero h1{
font-size:4rem;
line-height:1.1;
margin-bottom:20px;
}

.hero p{
font-size:1.2rem;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:15px 30px;
border-radius:50px;
text-decoration:none;
font-weight:600;
margin-right:15px;
}

.btn-primary{
background:var(--secondary);
color:white;
}

.btn-outline{
border:1px solid white;
color:white;
}

.section{
padding:100px 10%;
}

.section-title{
font-size:2.6rem;
margin-bottom:50px;
color:var(--primary);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:20px;
padding:30px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
transition:.4s;
}

.card:hover{
transform:translateY(-10px);
}

/* Card avec image */
.card-img{
background:white;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
transition:.4s;
overflow:hidden;
display:flex;
flex-direction:column;
}
.card-img:hover{transform:translateY(-10px);}

/* ── Section header avec boutons ── */
.section-header{
  display:flex;flex-direction:column;
  align-items:flex-start;gap:16px;
  margin-bottom:32px;
}
.section-header .section-title{margin-bottom:0;}
.section-btns{display:flex;gap:12px;}
.btn-section{
  display:inline-flex;align-items:center;
  padding:10px 22px;border-radius:8px;
  font-size:13px;font-weight:600;
  text-decoration:none;transition:.25s;
  letter-spacing:.02em;
}
.btn-section--primary{
  background:var(--secondary);color:white;
}
.btn-section--primary:hover{
  background:var(--accent);transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(74,144,226,.3);
}
.btn-section--outline{
  background:transparent;color:var(--secondary);
  border:1.5px solid var(--secondary);
}
.btn-section--outline:hover{
  background:var(--secondary);color:white;
  transform:translateY(-2px);
}

/* Carrousel horizontal */
.carousel-wrapper{
  position:relative;
}
.carousel-track{
  display:flex;
  gap:30px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  padding-bottom:8px;
}
.carousel-track::-webkit-scrollbar{display:none;}
.carousel-track .card-img{
  flex:0 0 280px;
  scroll-snap-align:start;
}
.carousel-track .card-img:hover{transform:translateY(-10px);}

/* Flèches carrousel */
.carousel-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:44px;height:44px;
  border-radius:50%;
  background:white;
  border:none;
  box-shadow:0 4px 16px rgba(0,0,0,.15);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  z-index:10;
  transition:.2s;
  color:var(--primary);
}
.carousel-btn:hover{background:var(--secondary);color:white;box-shadow:0 6px 20px rgba(31,95,175,.3);}
.carousel-btn--prev{left:-22px;}
.carousel-btn--next{right:-22px;}

.card-img .card-thumb{
width:100%;height:180px;
background:#e8edf4;
display:flex;align-items:center;justify-content:center;
overflow:hidden;flex-shrink:0;
}
.card-img .card-thumb img{width:100%;height:100%;object-fit:cover;}
.card-img .card-thumb-placeholder{font-size:11px;color:#7a8fa5;letter-spacing:.06em;text-transform:uppercase;}
.card-img .card-body{padding:24px 28px 28px;flex:1;display:flex;flex-direction:column;}
.card-img .card-body h3{font-size:1rem;font-weight:600;color:var(--primary);margin-bottom:8px;}
.card-img .card-body p{font-size:.85rem;color:#555;line-height:1.6;flex:1;}

.stats{
background:var(--primary);
color:white;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:30px;
text-align:center;
}

.stat-number{
font-size:3rem;
font-weight:700;
}

/* ── Actualités ── */
.actu-section{background:#fff;}
.actu-header{
  display:flex;justify-content:space-between;align-items:flex-end;
  margin-bottom:40px;
}
.actu-label{
  display:inline-block;
  font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--accent);margin-bottom:10px;
}
.actu-filter-btn{
  background:white;border:1.5px solid #dde3ec;color:var(--primary);
  padding:9px 18px;border-radius:24px;font-size:13px;font-weight:600;
  cursor:pointer;transition:.2s;font-family:'Inter',sans-serif;
}
.actu-filter-btn:hover{border-color:var(--accent);}
.actu-filter-btn.active{background:var(--primary);border-color:var(--primary);color:white;}
.actu-card.actu-filtered-out{display:none !important;}
.actu-track{
  display:flex;
  gap:24px;
  overflow-x:auto;
  scrollbar-width:none;
  padding-bottom:12px;
}
.actu-track::-webkit-scrollbar{display:none;}
.actu-card{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.07);
  transition:.35s;
  display:flex;flex-direction:column;
  flex-shrink:0;
}
.actu-card:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(0,0,0,.12);}
.actu-card--lg{width:420px;}
.actu-card--md{width:300px;}
.actu-card--sm{width:250px;}
.actu-img{
  position:relative;
  width:100%;
  background:#e8edf4;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;
}
.actu-card--lg .actu-img{height:240px;}
.actu-card--md .actu-img{height:180px;}
.actu-card--sm .actu-img{height:150px;}
.actu-img img{width:100%;height:100%;object-fit:cover;}
.actu-img-placeholder{font-size:11px;color:#7a8fa5;letter-spacing:.06em;text-transform:uppercase;}
.actu-tag{
  position:absolute;top:14px;left:14px;
  color:white;
  font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:4px 10px;border-radius:20px;
}
.actu-tag--bleu{background:var(--secondary);}
.actu-tag--vert{background:#16a34a;}
.actu-tag--rouge{background:#dc2626;}
.actu-tag--orange{background:#ea580c;}
.actu-tag--violet{background:#7c3aed;}
.actu-body{padding:22px 24px 26px;flex:1;display:flex;flex-direction:column;}
.actu-date{font-size:11px;color:#7a8fa5;font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;display:block;}
.actu-title{font-weight:700;color:var(--primary);line-height:1.4;margin-bottom:10px;}
.actu-card--lg .actu-title{font-size:1.15rem;}
.actu-card--md .actu-title{font-size:.95rem;}
.actu-card--sm .actu-title{font-size:.88rem;}
.actu-excerpt{font-size:.83rem;color:#555;line-height:1.7;flex:1;margin-bottom:16px;}
.actu-card--sm .actu-excerpt{display:none;}
.actu-lire{
  display:inline-flex;align-items:center;gap:6px;
  font-size:.82rem;font-weight:600;color:var(--secondary);
  text-decoration:none;transition:.2s;
}
.actu-lire:hover{color:var(--accent);gap:10px;}

/* ── Hero À propos ── */
.hero-apropos-wrap{
  min-height:100vh;
  background:linear-gradient(135deg,#0B1F3A 0%,#1a3a6b 100%);
  display:grid;grid-template-columns:1fr 1fr;
  align-items:center;
  padding:140px 10% 80px;
  gap:80px;position:relative;overflow:hidden;
}
.hero-apropos-text{position:relative;z-index:1;}
.hero-apropos-visual{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:28px;}
.hero-apropos-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;}

/* ── Curseur personnalisé ── */
*{cursor:none;}
#cursor{
  position:fixed;width:10px;height:10px;
  background:var(--accent);border-radius:50%;
  pointer-events:none;z-index:99999;
  transform:translate(-50%,-50%);
  transition:width .2s,height .2s,background .2s;
}
#cursor-ring{
  position:fixed;width:36px;height:36px;
  border:1.5px solid rgba(74,144,226,.5);border-radius:50%;
  pointer-events:none;z-index:99998;
  transform:translate(-50%,-50%);
  transition:transform .08s linear,width .2s,height .2s,opacity .2s;
}
body:hover #cursor{opacity:1;}
a:hover ~ #cursor, button:hover ~ #cursor{width:16px;height:16px;background:white;}

/* ── Hero animations ── */
.hero-content h1{
  overflow:hidden;
}
.hero-content h1 .line{
  display:block;
  transform:translateY(100%);
  opacity:0;
  animation:lineUp .8s cubic-bezier(.16,1,.3,1) forwards;
}
.hero-content h1 .line:nth-child(2){animation-delay:.15s;}
.hero-content p{opacity:0;transform:translateY(20px);animation:fadeUp .7s .5s ease forwards;}
.hero-content .btn:first-of-type{opacity:0;transform:translateY(20px);animation:fadeUp .7s .7s ease forwards;}
.hero-content .btn:last-of-type{opacity:0;transform:translateY(20px);animation:fadeUp .7s .85s ease forwards;}
@keyframes lineUp{to{transform:translateY(0);opacity:1;}}
@keyframes fadeUp{to{transform:translateY(0);opacity:1;}}

/* ── Scroll indicator ── */
.scroll-indicator{
  position:absolute;bottom:36px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  color:rgba(255,255,255,.6);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  animation:fadeUp .7s 1.2s ease forwards;opacity:0;
}
.scroll-indicator .arrow{
  width:20px;height:20px;border-right:1.5px solid rgba(255,255,255,.5);
  border-bottom:1.5px solid rgba(255,255,255,.5);
  transform:rotate(45deg);
  animation:bounce 1.6s infinite;
}
@keyframes bounce{0%,100%{transform:rotate(45deg) translateY(0);}50%{transform:rotate(45deg) translateY(5px);}}

/* ── Boutons premium ── */
.btn{position:relative;overflow:hidden;}
.btn::after{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,.15);
  transform:translateX(-101%);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
}
.btn:hover::after{transform:translateX(0);}
.btn-primary{transition:box-shadow .3s,transform .2s;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(31,95,175,.4);}
.btn-outline{transition:background .3s,transform .2s;}
.btn-outline:hover{background:rgba(255,255,255,.12);transform:translateY(-2px);}

/* ── Ticker bandeau ── */
.ticker-wrap{
  background:var(--primary);padding:14px 0;overflow:hidden;
  border-top:1px solid rgba(255,255,255,.06);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.ticker-track{
  display:flex;white-space:nowrap;
  animation:ticker 30s linear infinite;
}
.ticker-track:hover{animation-play-state:paused;}
.ticker-item{
  display:inline-flex;align-items:center;gap:18px;
  padding:0 32px;
  font-size:12px;font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;color:rgba(255,255,255,.5);
}
.ticker-item .dot{width:4px;height:4px;border-radius:50%;background:var(--accent);flex-shrink:0;}
@keyframes ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* ── Processus ── */
.process-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:0;position:relative;
}
.process-grid::before{
  content:'';position:absolute;top:32px;left:12.5%;right:12.5%;height:1.5px;
  background:linear-gradient(90deg,var(--accent),rgba(74,144,226,.2));
  z-index:0;
}
.process-step{
  display:flex;flex-direction:column;align-items:center;
  text-align:center;padding:0 20px;position:relative;z-index:1;
}
.process-num{
  width:64px;height:64px;border-radius:50%;
  background:white;border:2px solid var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;font-weight:700;color:var(--accent);
  margin-bottom:20px;
  transition:.4s;
  box-shadow:0 0 0 0 rgba(74,144,226,.3);
}
.process-step.visible .process-num{
  animation:pulse-ring 1s .3s ease forwards;
}
@keyframes pulse-ring{
  0%{box-shadow:0 0 0 0 rgba(74,144,226,.4);}
  70%{box-shadow:0 0 0 16px rgba(74,144,226,0);}
  100%{box-shadow:0 0 0 0 rgba(74,144,226,0);}
}
.process-step h3{font-size:1rem;font-weight:600;color:var(--primary);margin-bottom:8px;}
.process-step p{font-size:.85rem;color:#777;line-height:1.6;}

/* ── Back to top ── */
#back-top{
  position:fixed;bottom:32px;right:32px;
  width:44px;height:44px;border-radius:50%;
  background:var(--secondary);color:white;
  display:flex;align-items:center;justify-content:center;
  cursor:none;z-index:9000;
  opacity:0;transform:translateY(20px);
  transition:opacity .3s,transform .3s,background .2s;
  pointer-events:none;
}
#back-top.visible{opacity:1;transform:translateY(0);pointer-events:all;}
#back-top:hover{background:var(--accent);}
#back-top svg{width:18px;height:18px;}

footer{
background:#071A33;
color:white;
padding:60px 10% 0;
}
.footer-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:40px;
  padding-bottom:48px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.footer-title{
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.14em;
  color:rgba(255,255,255,.9);
  margin-bottom:16px;
}
.footer-links{
  list-style:none;padding:0;margin:0;
}
.footer-links li{margin-bottom:9px;}
.footer-links a{
  font-size:13px;color:rgba(255,255,255,.55);
  text-decoration:none;
  display:flex;align-items:baseline;gap:7px;
  transition:color .2s;
}
.footer-links a:hover{color:#4A90E2;}
.footer-links a span{
  color:var(--accent);font-size:11px;flex-shrink:0;
  transition:transform .2s;
}
.footer-links a:hover span{transform:translateX(3px);}
.footer-desc{
  font-size:13px;color:rgba(255,255,255,.45);
  line-height:1.7;margin-bottom:18px;
}
.footer-socials{
  display:flex;gap:14px;margin-top:8px;
}
.footer-socials a{
  color:rgba(255,255,255,.5);transition:.2s;
}
.footer-socials a:hover{color:#4A90E2;}
.footer-legal{
  display:flex;align-items:center;flex-wrap:wrap;
  gap:0;padding:16px 0;
  border-top:none;
}
.footer-legal a{
  font-size:12px;color:rgba(255,255,255,.35);
  text-decoration:none;
  padding:0 18px;
  border-right:1px solid rgba(255,255,255,.12);
  transition:color .2s;
}
.footer-legal a:first-child{padding-left:0;}
.footer-legal a:hover{color:rgba(255,255,255,.7);}
.footer-legal-copy{
  font-size:12px;color:rgba(255,255,255,.25);
  margin-left:auto;
}

/* ── Animations reveal ── */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .6s ease,transform .6s ease;}
.reveal.visible{opacity:1;transform:none;}

/* ── Pourquoi APH Drone ── */
.why-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:30px;}
.why-card{background:white;border-radius:20px;padding:32px 28px;box-shadow:0 10px 40px rgba(0,0,0,.07);border-top:3px solid var(--accent);transition:.3s;}
.why-card:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(0,0,0,.12);}
.why-icon{width:48px;height:48px;margin-bottom:18px;color:var(--accent);}
.why-icon svg{width:100%;height:100%;}
.why-card h3{font-size:1.05rem;font-weight:600;color:var(--primary);margin-bottom:10px;}
.why-card p{font-size:.88rem;color:#555;line-height:1.7;}

/* ── Stats animées ── */
.stat-item{text-align:center;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:30px;text-align:center;}
.stat-number{font-size:3rem;font-weight:700;}

/* ── Zone d'intervention ── */
.zone-wrap{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;}
.zone-list{list-style:none;padding:0;display:flex;flex-direction:column;gap:12px;}
.zone-list li{display:flex;align-items:center;gap:10px;font-size:.95rem;color:#444;}
.zone-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.zone-dot--light{background:#b0c4de;}
.zone-map svg{width:100%;max-width:300px;display:block;margin:auto;}

/* ── Témoignages ── */
.temoignages-track{
  display:flex;
  gap:24px;
  overflow-x:auto;
  scrollbar-width:none;
  padding-bottom:8px;
}
.temoignages-track::-webkit-scrollbar{display:none;}
.temoignage{
  flex:0 0 340px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:16px;
  padding:28px;
}
.temoignage-stars{color:#f59e0b;font-size:1.1rem;margin-bottom:14px;letter-spacing:2px;}
.temoignage p{color:rgba(255,255,255,.8);font-size:.9rem;line-height:1.7;font-style:italic;margin-bottom:16px;}
.temoignage-author{font-size:.8rem;color:rgba(255,255,255,.45);font-weight:500;}

/* ── Certifications ── */
.certif-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:20px;}
.certif-badge{background:white;border:1px solid #e8edf4;border-radius:14px;padding:22px 16px;display:flex;flex-direction:column;align-items:center;gap:12px;transition:.3s;cursor:default;}
.certif-badge:hover{border-color:var(--accent);box-shadow:0 8px 24px rgba(74,144,226,.15);transform:translateY(-4px);}
.certif-badge svg{width:32px;height:32px;}
.certif-badge span{font-size:.8rem;font-weight:600;color:var(--primary);text-align:center;}

/* ── Contact ── */
.contact-wrap{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start;}
.contact-infos{display:flex;flex-direction:column;gap:14px;}
.contact-info-item{display:flex;align-items:center;gap:12px;color:var(--secondary);font-weight:600;font-size:.95rem;text-decoration:none;transition:.2s;}
.contact-info-item:hover{color:var(--accent);}
.contact-info-item svg{width:20px;height:20px;flex-shrink:0;}
.contact-form{display:flex;flex-direction:column;gap:14px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:14px 16px;border:1.5px solid #dde3ec;border-radius:10px;font-family:'Inter',sans-serif;font-size:.9rem;color:#222;background:white;transition:.2s;outline:none;}

.hero-stats-p{display:flex;gap:60px;margin-top:40px;}

.hero-stat-p .lbl{font-size:11px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.08em;margin-top:4px;}

/* Logos défilants */
.logos-section-p{padding:60px 0;background:white;overflow:hidden;position:relative;}
.logos-section-p::before,.logos-section-p::after{content:'';position:absolute;top:0;bottom:0;width:100px;z-index:2;}
.logos-section-p::before{left:0;background:linear-gradient(90deg,white,transparent);}
.logos-section-p::after{right:0;background:linear-gradient(270deg,white,transparent);}
.logos-track-p{display:flex;gap:40px;width:max-content;animation:scrollLogos 30s linear infinite;}
.logos-track-p:hover{animation-play-state:paused;}
@keyframes scrollLogos{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.logo-item-p{width:140px;height:64px;background:#F5F7FA;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid #e8edf4;font-size:10px;font-weight:700;color:#9aa8b8;letter-spacing:.06em;text-transform:uppercase;text-align:center;padding:8px;}

/* Grille partenaires */
.partners-section-p{padding:80px 10%;background:#F5F7FA;}
.partners-grid-p{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
.partner-card-p{background:white;border-radius:16px;padding:28px;border:1px solid #e8edf4;transition:.3s;}
.partner-card-p:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,.08);}
.partner-card-p.featured{grid-column:span 2;}
.partner-logo-p{width:56px;height:56px;border-radius:12px;background:#F5F7FA;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#7a8fa5;text-align:center;margin-bottom:16px;border:1px solid #e8edf4;}
.partner-cat-p{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#4A90E2;margin-bottom:6px;}
.partner-name-p{font-size:1rem;font-weight:700;color:#0B1F3A;margin-bottom:4px;}
.partner-loc-p{font-size:.78rem;color:#7a8fa5;margin-bottom:12px;}
.partner-desc-p{font-size:.82rem;color:#555;line-height:1.7;margin-bottom:16px;}
.partner-tags-p{display:flex;flex-wrap:wrap;gap:6px;}
.partner-tag-p{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;background:#F5F7FA;color:#555;border:1px solid #e0e8f0;}

/* Témoignages */
.temoignages-section-p{padding:80px 10%;background:white;}
.temoignages-grid-p{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.temoignage-card-p{background:#F5F7FA;border-radius:14px;padding:24px;border:1px solid #e8edf4;}
.temoignage-card-p.featured{grid-column:span 2;background:#0B1F3A;}
.temoignage-text-p{font-size:.87rem;color:#444;line-height:1.8;font-style:italic;margin-bottom:16px;}

.temoignage-author-p{font-size:.78rem;font-weight:600;color:#0B1F3A;}
.temoignage-card-p.featured .temoignage-author-p{color:white;}
.temoignage-role-p{font-size:.72rem;color:#7a8fa5;}
.temoignage-card-p.featured .temoignage-role-p{color:rgba(255,255,255,.45);}

/* CTA */
.cta-section-p{padding:80px 10%;background:linear-gradient(135deg,#0B1F3A,#1a3a6b);text-align:center;color:white;}
.cta-section-p h2{font-size:2rem;font-weight:700;margin-bottom:16px;}
.cta-section-p p{font-size:.95rem;color:rgba(255,255,255,.65);max-width:500px;margin:0 auto 36px;line-height:1.75;}
.cta-btns-p{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;}
.btn-cta-w{display:inline-flex;align-items:center;gap:8px;background:white;color:#0B1F3A;padding:13px 26px;border-radius:8px;font-size:.88rem;font-weight:600;text-decoration:none;transition:.25s;}
.btn-cta-w:hover{background:#4A90E2;color:white;}
.btn-cta-o{display:inline-flex;align-items:center;gap:8px;background:transparent;color:white;border:1.5px solid rgba(255,255,255,.3);padding:13px 26px;border-radius:8px;font-size:.88rem;font-weight:600;text-decoration:none;transition:.25s;}
.btn-cta-o:hover{border-color:white;}

@media(max-width:768px){
  .page-hero-p{padding:100px 6% 60px !important;}
  .hero-stats-p{gap:24px;flex-wrap:wrap;}
  .partners-grid-p{grid-template-columns:1fr !important;}
  .partner-card-p.featured{grid-column:span 1 !important;}
  .temoignages-grid-p{grid-template-columns:1fr !important;}
  .temoignage-card-p.featured{grid-column:span 1 !important;}
  .cta-section-p{padding:60px 6% !important;}

:root{
--primary:#0B1F3A;
--secondary:#1F5FAF;
--accent:#4A90E2;
--light:#F5F7FA;
--white:#fff;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#fff;color:#222;overflow-x:hidden;}

/* ── HEADER opaque fixe (règle pages secondaires) ── */
#site-header{
  position:fixed;top:0;width:100%;z-index:9999;
  padding:16px 60px;
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(11,31,58,.97);
  transition:.3s;font-family:'Inter',sans-serif;
}
#site-header .logo img{height:64px;width:64px;border-radius:50%;object-fit:cover;display:block;}
#site-header nav ul{display:flex;gap:28px;list-style:none;margin:0;padding:0;align-items:center;}
#site-header nav a{color:white;text-decoration:none;font-weight:500;font-size:14px;}
#site-header .has-dropdown{position:relative;}
#site-header .dropdown{
  display:none;position:absolute;top:100%;left:0;
  background:#fff;min-width:220px;
  box-shadow:0 8px 32px rgba(0,0,0,.15);
  border-top:3px solid #4A90E2;
  z-index:99999;padding:6px 0;
}
#site-header .dropdown li{list-style:none;}
#site-header .dropdown li a{
  display:block;padding:10px 18px;font-size:13px;
  font-weight:500;color:#0B1F3A;
  border-bottom:1px solid #f0f0f0;transition:.15s;
  white-space:nowrap;text-decoration:none;
}
#site-header .dropdown li:last-child a{border:none;}
#site-header .dropdown li a:hover{background:#f5f7fa;color:#4A90E2;padding-left:24px;}

/* ── HERO sobre ── */
.page-hero{
  padding:140px 10% 70px;
  background:linear-gradient(135deg, var(--primary) 0%, #1a3a6b 100%);
  color:white;
  position:relative;
  overflow:hidden;
}
.page-hero::after{
  content:'';
  position:absolute;
  right:-80px;bottom:-80px;
  width:400px;height:400px;
  border-radius:50%;
  background:rgba(74,144,226,.08);
}
.breadcrumb{
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:rgba(255,255,255,.5);
  margin-bottom:20px;letter-spacing:.04em;
}
.breadcrumb a{color:rgba(255,255,255,.5);text-decoration:none;transition:.2s;}
.breadcrumb a:hover{color:white;}
.breadcrumb span{color:rgba(255,255,255,.3);}
.page-hero h1{font-size:3rem;font-weight:700;line-height:1.1;margin-bottom:16px;}
.page-hero p{font-size:1.1rem;color:rgba(255,255,255,.7);max-width:560px;line-height:1.7;}

/* ── FILTRES ── */
.filtres-wrap{
  padding:40px 10% 0;
  display:flex;align-items:center;gap:12px;
  flex-wrap:wrap;
}
.filtre-btn{
  padding:8px 18px;border-radius:30px;
  font-size:12px;font-weight:600;letter-spacing:.04em;
  cursor:pointer;border:1.5px solid #dde3ec;
  background:white;color:#555;
  transition:.2s;
}
.filtre-btn:hover{border-color:var(--accent);color:var(--accent);}
.filtre-btn.active{background:var(--secondary);color:white;border-color:var(--secondary);}
.filtre-btn[data-cat="Formation"].active{background:var(--secondary);}
.filtre-btn[data-cat="Mission"].active{background:#16a34a;}
.filtre-btn[data-cat="Réglementation"].active{background:#dc2626;}
.filtre-btn[data-cat="Événement"].active{background:#7c3aed;}
.filtre-btn[data-cat="Agriculture"].active{background:#ea580c;}
.filtre-btn[data-cat="Sécurité civile"].active{background:#0B1F3A;}

/* ── GRILLE ACTUALITÉS ── */
.actu-page{padding:40px 10% 100px;}

/* Grille mosaïque 6 colonnes */
#firebase-mosaic,
.actu-mosaic{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:24px;
  margin-bottom:28px;
}
/* Grande : span 4 */
#firebase-mosaic .actu-card--lg,
.actu-mosaic .actu-card--span2{grid-column:span 4;}
#firebase-mosaic .actu-card--lg .actu-img,
.actu-mosaic .actu-card--span2 .actu-img{height:280px;}
/* Moyenne : span 3 */
#firebase-mosaic .actu-card--md,
.actu-mosaic .actu-card--md{grid-column:span 3;}
#firebase-mosaic .actu-card--md .actu-img,
.actu-mosaic .actu-card--md .actu-img{height:220px;}
/* Petite : span 2 */
#firebase-mosaic .actu-card--sm,
.actu-mosaic .actu-card--sm{grid-column:span 2;}
#firebase-mosaic .actu-card--sm .actu-img,
.actu-mosaic .actu-card--sm .actu-img{height:160px;}

.actu-card{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.07);
  transition:.35s;
  display:flex;flex-direction:column;
  opacity:1;
}
.actu-card.hidden{display:none;}
.actu-card:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(0,0,0,.12);}

.actu-img{
  position:relative;
  width:100%;
  background:#e8edf4;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;
}
.actu-img-placeholder{font-size:11px;color:#7a8fa5;letter-spacing:.06em;text-transform:uppercase;}
.actu-card--span2 .actu-img{height:280px;}
.actu-card:not(.actu-card--span2) .actu-img{height:200px;}
.actu-img img{width:100%;height:100%;object-fit:cover;}

.actu-tag{
  position:absolute;top:14px;left:14px;
  color:white;font-size:11px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  padding:4px 12px;border-radius:20px;
}
.actu-tag--bleu{background:var(--secondary);}
.actu-tag--vert{background:#16a34a;}
.actu-tag--rouge{background:#dc2626;}
.actu-tag--orange{background:#ea580c;}
.actu-tag--violet{background:#7c3aed;}
.actu-tag--marine{background:#0B1F3A;}

.actu-body{padding:24px 26px 28px;flex:1;display:flex;flex-direction:column;}
.actu-date{font-size:11px;color:#7a8fa5;font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;display:block;}
.actu-title{font-weight:700;color:var(--primary);line-height:1.4;margin-bottom:12px;}
.actu-card--span2 .actu-title{font-size:1.25rem;}
.actu-card:not(.actu-card--span2) .actu-title{font-size:.98rem;}
.actu-excerpt{font-size:.85rem;color:#555;line-height:1.7;flex:1;margin-bottom:18px;}
.actu-lire{
  display:inline-flex;align-items:center;gap:6px;
  font-size:.82rem;font-weight:600;color:var(--secondary);
  text-decoration:none;transition:.2s;
  background:none;border:none;cursor:pointer;padding:0;font-family:'Inter',sans-serif;
}
.actu-lire:hover{color:var(--accent);gap:10px;}

/* ── SÉPARATEUR de mois ── */
.actu-mois{
  grid-column:1/-1;
  display:flex;align-items:center;gap:16px;
  padding:8px 0;
}
.actu-mois span{
  font-size:11px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--accent);
  white-space:nowrap;
}
.actu-mois::after{
  content:'';flex:1;
  height:1px;background:#e8edf4;
}

/* ── BOUTON TÉLÉPHONE ── */
#back-top{
  position:fixed;bottom:30px;right:30px;
  width:52px;height:52px;border-radius:50%;
  background:var(--secondary);color:white;
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;box-shadow:0 8px 24px rgba(31,95,175,.4);
  transition:.3s;z-index:999;
  opacity:0;pointer-events:none;
}
#back-top.visible{opacity:1;pointer-events:all;}
#back-top:hover{background:var(--accent);}
#back-top svg{width:20px;height:20px;}

/* ── Panel article ── */
#article-overlay{
  position:fixed;inset:0;
  background:rgba(11,31,58,.55);
  backdrop-filter:blur(4px);
  z-index:99998;
  opacity:0;pointer-events:none;
  transition:opacity .35s;
}
#article-overlay.open{opacity:1;pointer-events:all;}

#article-panel{
  position:fixed;top:0;right:0;
  width:min(680px,95vw);height:100vh;
  background:#fff;
  z-index:99999;
  overflow-y:auto;
  transform:translateX(100%);
  transition:transform .4s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
}
#article-panel.open{transform:translateX(0);}

#article-panel .ap-header{
  position:sticky;top:0;
  background:#fff;
  padding:20px 32px 16px;
  border-bottom:1px solid #eee;
  display:flex;align-items:center;justify-content:space-between;
  z-index:10;
}
#article-panel .ap-close{
  width:40px;height:40px;border-radius:50%;
  border:none;background:#f5f7fa;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:#555;transition:.2s;flex-shrink:0;
}
#article-panel .ap-close:hover{background:var(--primary);color:white;}

#article-panel .ap-img{
  width:100%;height:280px;
  background:#e8edf4;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden;
}
#article-panel .ap-img img{width:100%;height:100%;object-fit:cover;}
#article-panel .ap-img-placeholder{font-size:12px;color:#7a8fa5;letter-spacing:.06em;text-transform:uppercase;}

#article-panel .ap-body{padding:36px 40px 60px;flex:1;}
#article-panel .ap-meta{
  display:flex;align-items:center;gap:12px;
  margin-bottom:20px;
}
#article-panel .ap-tag{
  font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:4px 12px;border-radius:20px;color:white;
}
#article-panel .ap-date{font-size:12px;color:#7a8fa5;font-weight:500;}
#article-panel .ap-title{
  font-size:1.6rem;font-weight:700;
  color:var(--primary);line-height:1.3;
  margin-bottom:24px;
}
#article-panel .ap-content{
  font-size:.95rem;color:#444;line-height:1.85;
}
#article-panel .ap-content p{margin-bottom:18px;}
#article-panel .ap-content h4{
  font-size:1rem;font-weight:700;color:var(--primary);
  margin:28px 0 10px;
}
#article-panel .ap-content ul{
  padding-left:20px;margin-bottom:18px;
}
#article-panel .ap-content ul li{margin-bottom:6px;}
#article-panel .ap-cta{
  margin-top:36px;padding-top:28px;
  border-top:1px solid #eee;
}
#article-panel .ap-cta a{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--secondary);color:white;
  padding:12px 24px;border-radius:8px;
  font-size:.88rem;font-weight:600;
  text-decoration:none;transition:.2s;
}
#article-panel .ap-cta a:hover{background:var(--accent);}

/* ── Curseur ── */
.reveal{opacity:0;transform:translateY(24px);transition:opacity .5s ease,transform .5s ease;}
.reveal.visible{opacity:1;transform:none;}

/* ── FOOTER ── */
footer{background:var(--primary);color:white;padding:60px 10% 0;}
.footer-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:40px;padding-bottom:50px;border-bottom:1px solid rgba(255,255,255,.08);}
.footer-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:18px;}
.footer-links{list-style:none;display:flex;flex-direction:column;gap:8px;}
.footer-links a{color:rgba(255,255,255,.7);text-decoration:none;font-size:13px;transition:.2s;display:flex;align-items:center;gap:6px;}
.footer-links a span{color:var(--accent);font-size:15px;}
.footer-links a:hover{color:white;padding-left:4px;}
.footer-desc{font-size:13px;color:rgba(255,255,255,.5);line-height:1.7;margin-bottom:18px;}
.footer-socials{display:flex;gap:12px;margin-top:6px;}
.footer-socials a{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);transition:.2s;text-decoration:none;}
.footer-socials a:hover{background:var(--accent);color:white;}
.footer-legal{display:flex;flex-wrap:wrap;gap:16px;align-items:center;padding:20px 0;font-size:11px;}
.footer-legal a{color:rgba(255,255,255,.4);text-decoration:none;transition:.2s;}
.footer-legal a:hover{color:white;}
.footer-legal-copy{margin-left:auto;color:rgba(255,255,255,.25);}

.breadcrumb-p{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.5);margin-bottom:20px;}

/* Logos défilants */
.logos-section-p{padding:60px 0;background:white;overflow:hidden;position:relative;}
.logos-section-p::before,.logos-section-p::after{content:'';position:absolute;top:0;bottom:0;width:100px;z-index:2;}
.logos-section-p::before{left:0;background:linear-gradient(90deg,white,transparent);}
.logos-section-p::after{right:0;background:linear-gradient(270deg,white,transparent);}
.logos-track-p{display:flex;gap:40px;width:max-content;animation:scrollLogos 30s linear infinite;}

@keyframes scrollLogos{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.logo-item-p{width:140px;height:64px;background:#F5F7FA;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid #e8edf4;font-size:10px;font-weight:700;color:#9aa8b8;letter-spacing:.06em;text-transform:uppercase;text-align:center;padding:8px;}

.partner-card-p{background:white;border-radius:16px;padding:28px;border:1px solid #e8edf4;transition:.3s;}

.partner-card-p.featured{grid-column:span 2;}

.partner-cat-p{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#4A90E2;margin-bottom:6px;}
.partner-name-p{font-size:1rem;font-weight:700;color:#0B1F3A;margin-bottom:4px;}
.partner-loc-p{font-size:.78rem;color:#7a8fa5;margin-bottom:12px;}
.partner-desc-p{font-size:.82rem;color:#555;line-height:1.7;margin-bottom:16px;}
.partner-tags-p{display:flex;flex-wrap:wrap;gap:6px;}
.partner-tag-p{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;background:#F5F7FA;color:#555;border:1px solid #e0e8f0;}

/* Témoignages */
.temoignages-section-p{padding:80px 10%;background:white;}
.temoignages-grid-p{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.temoignage-card-p{background:#F5F7FA;border-radius:14px;padding:24px;border:1px solid #e8edf4;}
.temoignage-card-p.featured{grid-column:span 2;background:#0B1F3A;}
.temoignage-text-p{font-size:.87rem;color:#444;line-height:1.8;font-style:italic;margin-bottom:16px;}

.temoignage-author-p{font-size:.78rem;font-weight:600;color:#0B1F3A;}
.temoignage-card-p.featured .temoignage-author-p{color:white;}
.temoignage-role-p{font-size:.72rem;color:#7a8fa5;}
.temoignage-card-p.featured .temoignage-role-p{color:rgba(255,255,255,.45);}

/* CTA */

<script>
// Dropdowns header
document.querySelectorAll('#site-header .has-dropdown').forEach(function(item){

// ── Panel article ──
var tagColors = {
  'actu-tag--bleu': '#1F5FAF',
  'actu-tag--vert': '#16a34a',
  'actu-tag--rouge': '#dc2626',
  'actu-tag--orange': '#ea580c',
  'actu-tag--violet': '#7c3aed',
  'actu-tag--marine': '#0B1F3A'
};

function openArticle(card){
  var tplId = card.dataset.tpl || '';
  var source = card.dataset.source || '';
  var tag = card.dataset.tag || '';
  var tagcol = card.dataset.tagcol || 'actu-tag--bleu';
  var date = card.dataset.date || '';
  var title = card.dataset.title || '';
  var img = card.dataset.img || '';
  var ctaText = card.dataset.ctaText || '';
  var ctaHref = card.dataset.ctaHref || '';
  var color = tagColors[tagcol] || '#1F5FAF';

  // Contenu : depuis Firebase (tplContent) ou depuis template HTML
  var content = '';
  if(source === 'firebase'){
    content = card.dataset.tplContent || '';
  } else {
    var tplEl = document.getElementById(tplId);
    content = tplEl ? tplEl.innerHTML : '';
  }

  document.getElementById('ap-meta').innerHTML =
    '<span class="ap-tag" style="background:'+color+'">'+tag+'</span>' +
    '<span class="ap-date">'+date+'</span>';
  document.getElementById('ap-title').textContent = title;
  document.getElementById('ap-content').innerHTML = content;

  // CTA
  var ctaEl = document.getElementById('ap-cta');
  if(ctaText && ctaHref){
    ctaEl.innerHTML = '<a href="'+ctaHref+'">'+ctaText+' <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>';
  } else {
    ctaEl.innerHTML = '';
  }

  // Image
  var imgEl = document.getElementById('ap-img');
  if(img){
    imgEl.innerHTML = '<img src="'+img+'" alt="'+title+'">';
  } else {
    imgEl.innerHTML = '<span class="ap-img-placeholder">Photo</span>';
  }

  document.getElementById('article-overlay').classList.add('open');
  document.getElementById('article-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePanel(){
  document.getElementById('article-overlay').classList.remove('open');
  document.getElementById('article-panel').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') closePanel();
});

})();

// Reveal au scroll
(function(){

    entries.forEach(function(e){
      if(e.isIntersecting){ e.target.classList.add('visible'); io.unobserve(e.target); }
    });
  },{threshold:0.1});
  els.forEach(function(el){ io.observe(el); });
})();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, orderBy, query }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAV5NQWfp8n9RkTrHSwqssBJ4R9lNAuYK8",
  authDomain: "aph-drone.firebaseapp.com",
  projectId: "aph-drone",
  storageBucket: "aph-drone.firebasestorage.app",
  messagingSenderId: "316810168380",
  appId: "1:316810168380:web:66cb916cec4fdc00b9db39"
};

const tagColors = {
  'Réglementation':'#dc2626','Formation':'#1F5FAF','Mission':'#16a34a',
  'Événement':'#7c3aed','Agriculture':'#ea580c','Sécurité civile':'#0B1F3A'
};
const tagClasses = {
  'Réglementation':'actu-tag--rouge','Formation':'actu-tag--bleu','Mission':'actu-tag--vert',
  'Événement':'actu-tag--violet','Agriculture':'actu-tag--orange','Sécurité civile':'actu-tag--marine'
};

try {
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const q = query(collection(db, 'actualites'), orderBy('ordre','desc'));
  const snap = await getDocs(q);

  if(!snap.empty){
    const mosaic = document.getElementById('firebase-mosaic');
    const sizes = ['lg','md','sm','lg','md','sm']; // alternance des tailles
    let i = 0;

    snap.forEach(docSnap => {
      const d = docSnap.data();
      if (d.active === false) return; // article désactivé depuis l'admin
      const taille = d.taille || sizes[i % sizes.length];
      const tagClass = tagClasses[d.cat] || 'actu-tag--bleu';
      const color = tagColors[d.cat] || '#1F5FAF';
      const imgHtml = d.photoUrl
        ? `<img src="${d.photoUrl}" alt="${d.titre}" style="width:100%;height:100%;object-fit:cover;">`
        : `<span class="actu-img-placeholder">Photo</span>`;
      const ctaHtml = d.ctaTexte && d.ctaLien
        ? `<div class="ap-cta" style="margin-top:16px;padding-top:16px;border-top:1px solid #eee;"><a href="${d.ctaLien}" style="display:inline-flex;align-items:center;gap:6px;background:#1F5FAF;color:white;padding:10px 20px;border-radius:8px;font-size:.82rem;font-weight:600;text-decoration:none;">${d.ctaTexte}</a></div>` : '';

      const art = document.createElement('article');
      art.className = `actu-card actu-card--${taille} reveal visible`;
      art.dataset.cat = d.cat;
      // Stocker contenu pour le panel
      art.dataset.tplContent = d.contenu || '';
      art.dataset.tag = d.cat;
      art.dataset.tagcol = tagClass;
      art.dataset.date = d.date;
      art.dataset.title = d.titre;
      art.dataset.img = d.photoUrl || '';
      art.dataset.ctaText = d.ctaTexte || '';
      art.dataset.ctaHref = d.ctaLien || '';
      art.dataset.source = 'firebase';
      art.innerHTML = `
        <div class="actu-img"><span class="actu-tag ${tagClass}">${d.cat}</span>${imgHtml}</div>
        <div class="actu-body">
          <time class="actu-date">${d.date}</time>
          <h3 class="actu-title">${d.titre}</h3>
          ${d.extrait ? `<p class="actu-excerpt">${d.extrait}</p>` : ''}
          <button class="actu-lire" onclick="openArticle(this.closest('.actu-card'))">Lire la suite <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
        </div>
      `;
      mosaic.appendChild(art);
      i++;
    });

    // Activer reveal sur les nouvelles cartes
    const io = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){ e.target.classList.add('visible'); io.unobserve(e.target); }
      });
    },{threshold:0.1});
    mosaic.querySelectorAll('.reveal').forEach(el => io.observe(el));

    window._firebaseLoaded = true;
  } else {
    document.getElementById('firebase-mosaic').innerHTML =
      '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#7a8fa5;">' +
      '<p style="font-size:1rem;">Aucune actualité publiée pour le moment.</p>' +
      '<p style="font-size:.85rem;margin-top:6px;">Revenez bientôt pour suivre nos dernières nouvelles.</p>' +
      '</div>';
  }
} catch(e) {
  console.warn('Firebase non disponible:', e.message);
}
</script>

<!-- Curseur personnalisé -->
<div id="cursor"></div>
<div id="cursor-ring"></div>
<script>
// ── Dropdowns header (redondant avec include.js mais sécurisé) ──
(function(){
  function attachDropdowns(){
    var headerEl = document.getElementById('site-header');
    if(!headerEl){ setTimeout(attachDropdowns, 50); return; }
  }
  attachDropdowns();
})();

// ── Curseur ──
(function(){
  var c = document.getElementById('cursor');
  var r = document.getElementById('cursor-ring');
  var mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',function(e){
    mx=e.clientX; my=e.clientY;
    c.style.left=mx+'px'; c.style.top=my+'px';
  });
  function animRing(){
    rx += (mx-rx)*.12; ry += (my-ry)*.12;
    r.style.left=rx+'px'; r.style.top=ry+'px';
    requestAnimationFrame(animRing);
  }
  animRing();
  document.querySelectorAll('a,button,[type=submit]').forEach(function(el){
    el.addEventListener('mouseenter',function(){
      c.style.width='20px';c.style.height='20px';c.style.background='white';
      r.style.width='52px';r.style.height='52px';r.style.opacity='.3';
    });
    el.addEventListener('mouseleave',function(){
      c.style.width='10px';c.style.height='10px';c.style.background='var(--accent)';
      r.style.width='36px';r.style.height='36px';r.style.opacity='1';
    });
  });
})();

// ── Reveal au scroll ──
(function(){
  var els = document.querySelectorAll('.reveal');
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){ e.target.classList.add('visible'); io.unobserve(e.target); }
    });
  },{threshold:0.15});
  els.forEach(function(el){ io.observe(el); });
})();

// ── Compteurs stats animés ──
(function(){
  var nums = document.querySelectorAll('.stat-number[data-target]');
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(!e.isIntersecting) return;
      var el = e.target;
      var raw = el.dataset.target;
      var target = parseFloat(raw);
      // Si la valeur n'est pas un nombre (ex: "48h", "7j/7", "360°"), afficher directement
      if(isNaN(target)){
        el.textContent = raw;
        io.unobserve(el);
        return;
      }
      var duration = 1800, start = null;
      function step(ts){
        if(!start) start = ts;
        var progress = Math.min((ts-start)/duration,1);
        var ease = 1-Math.pow(1-progress,3);
        var val = Math.round(ease*target);
        el.textContent = val;
        if(progress < 1) requestAnimationFrame(step);
        else el.textContent = raw; // affiche la valeur finale exacte du data-target
      }
      requestAnimationFrame(step);
      io.unobserve(el);
    });
  },{threshold:0.5});
  nums.forEach(function(n){ io.observe(n); });
})();

// Bouton téléphone — toujours visible
(function(){
  var bt = document.getElementById('back-top');
  if(bt) bt.classList.add('visible');
})();

// ── Carrousels : auto-scroll continu + flèches ──
(function(){
  var SPEED = 1.2;   // px par frame
  var CARD_W = 310;  // 280px + 30px gap

  function setupCarousel(track, customSpeed){
    var spd = customSpeed || SPEED;
    // 1. Cloner les cartes pour boucle infinie
    var origCards = Array.from(track.children);
    origCards.forEach(function(card){
      var clone = card.cloneNode(true);
      clone.setAttribute('aria-hidden','true');
      track.appendChild(clone);
    });
    var halfWidth = track.scrollWidth / 2;

    // 2. Désactiver scroll-snap (incompatible avec scrollLeft+=)
    track.style.scrollSnapType = 'none';

    var paused = false;

    function autoScroll(){
      if(!paused){
        track.scrollLeft += spd;
        if(track.scrollLeft >= halfWidth){
          track.scrollLeft -= halfWidth;
        }
      }
      requestAnimationFrame(autoScroll);
    }

    // Pause au survol
    track.addEventListener('mouseenter', function(){ paused = true; });
    track.addEventListener('mouseleave', function(){ paused = false; });
    track.addEventListener('touchstart', function(){ paused = true; }, {passive:true});
    track.addEventListener('touchend', function(){
      setTimeout(function(){ paused = false; }, 2000);
    }, {passive:true});

    // Méthode pause temporaire pour les flèches
    track._pause = function(){
      paused = true;
      setTimeout(function(){ paused = false; }, 2500);
    };

    requestAnimationFrame(autoScroll);
  }

  // Flèches
  window.scrollCarousel = function(btn, dir){
    var wrapper = btn.closest('.carousel-wrapper');
    var track = wrapper.querySelector('.carousel-track, .actu-track, .temoignages-track');
    track._pause && track._pause();
    track.scrollBy({ left: dir * CARD_W, behavior: 'smooth' });
  };

  // Lancer après chargement du DOM
  function initCarousels(){
    document.querySelectorAll('.carousel-track').forEach(function(track){
      if(track.id === 'carousel-temoignages'){
        setupCarousel(track, 0.4);
      } else if(track.classList.contains('actu-track')){
        setupCarousel(track, 0.5);
      } else {
        setupCarousel(track);
      }
    });
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', initCarousels);
  } else {
    initCarousels();
  }
})();

</script>
</body>
</html>
